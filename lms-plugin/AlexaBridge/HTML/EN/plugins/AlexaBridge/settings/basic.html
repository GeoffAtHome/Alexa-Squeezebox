<h1>Alexa Bridge Settings</h1>

<p>
  Configure the shared secret used by Lambda API authentication and signed
  stream URLs.
</p>

<form method="post" action="">
  <input type="hidden" name="saveSettings" value="1" />

  <p>
    <label for="pref_secret"><strong>Shared Secret</strong></label
    ><br />
    <input
      id="pref_secret"
      class="stdedit"
      type="password"
      name="pref_secret"
      value="[% pref_secret | html %]"
      size="48"
      autocomplete="new-password"
    />
  </p>

  <p>
    <label for="pref_token_ttl"
      ><strong>Stream URL Lifetime (seconds)</strong></label
    ><br />
    <input
      id="pref_token_ttl"
      class="stdedit"
      type="number"
      name="pref_token_ttl"
      value="[% pref_token_ttl | html %]"
      min="300"
      max="604800"
    />
  </p>

  <p>
    <button type="submit">Save Settings</button>
  </p>
</form>

[% IF api_token %]
<p>
  <strong>Computed API Token</strong><br />
  <code>[% api_token | html %]</code>
</p>
[% END %]

<p>
  <a href="[% status_url | html %]" target="_blank">Open Alexa Status Page</a>
</p>
